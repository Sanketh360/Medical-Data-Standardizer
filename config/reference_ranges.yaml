# Numerical Reference Ranges & Thresholds
# Standard Units: Hemoglobin (g/dL), Creatinine (mg/dL), Electrolytes (mmol/L), WBC/RBC/Platelets (cells/uL or count/uL)

HAEMOGLOBIN:
  unit: g/dL
  low: 13.0
  high: 17.0
  outlier_low: 5.0
  outlier_high: 25.0
  Male:
    low: 13.0
    high: 17.0
  Female:
    low: 12.0
    high: 15.0
  Child:
    low: 10.0
    high: 14.0

WHITE_BLOOD_CELL_COUNT:
  unit: cells/cu.mm
  low: 4000.0
  high: 11000.0
  outlier_low: 500.0
  outlier_high: 50000.0

SERUM_CREATININE:
  unit: mg/dL
  low: 0.66
  high: 1.25
  outlier_low: 0.1
  outlier_high: 10.0

SODIUM:
  unit: mmol/L
  low: 135.0
  high: 145.0
  outlier_low: 100.0
  outlier_high: 180.0

POTASSIUM:
  unit: mmol/L
  low: 3.5
  high: 5.0
  outlier_low: 1.5
  outlier_high: 10.0

RBC_COUNT:
  unit: Million/cu.mm
  low: 4.5
  high: 5.5
  outlier_low: 1.5
  outlier_high: 8.0

PLATELET_COUNT:
  unit: /cu.mm
  low: 150000.0
  high: 410000.0
  outlier_low: 10000.0
  outlier_high: 1000000.0

NEUTROPHILS:
  unit: "%"
