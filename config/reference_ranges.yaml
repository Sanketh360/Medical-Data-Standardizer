  outlier_high: 70.0

MEAN_CORPUSCULAR_VOLUME:
  unit: fL
  low: 83.0
  high: 101.0
  outlier_low: 50.0
  outlier_high: 130.0

MCH:
  unit: pg
  low: 27.0
  high: 32.0
